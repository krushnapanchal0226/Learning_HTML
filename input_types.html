<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>HTML Input Types Demo</h1>
    <form>
        <label>Enter Your Name</label>
        <input type="text" placeholder="Enter Your Name"/><br><br>
        <label>Enter Your Email</label>
        <input type="email" placeholder="Enter Email"/><br><br>
        <label>Enter Your Password</label>
        <input type="password" placeholder="Enter Your Password"/><br><br>
        <label>Enter Your Phone Number</label>
        <input type="number" placeholder="Enter Number"/><br><br>

        <label>Enter The Birth Date</label>
        <input type="date"/><br><br>
        <label>Enter Month</label>
        <input type="month"/><br><br>
        <label>Enter Week</label>
        <input type="week"/><br><br>
        <label>Enter Time</label>
        <input type="time"/><br><br>
        <label>Date & Time</label>
        <input type="datetime-local"/><br><br>

        <label>Choose Cities</label>
        <input type="checkbox" checked>Mumbai
        <input type="checkbox"checked>Pune
        <input type="checkbox">Nashik
        <input type="checkbox">Jalna
        <input type="checkbox">Beed<br><br>

        <label>Select Gender</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">Others<br><br>

        <label>Select color</label>
        <input type="color"><br><br>

        <label>Upload your photo</label>
        <input type="file" multiple><br><br>

        <label>Select Range</label>
        <input type="range"><br><br>

        <label>Select Your Fav Cricketer</label>
        <select>
            <option>Choose...</option>
            <option>Virat Kohli</option>
            <option>Rohit Sharma</option>
            <option>Jasprit Bhumrah</option>
            <option>Hardik Pandya</option>
            <option>Suryakumar Yadav</option>
        </select><br><br>

        <label>Enter Your Address</label>
        <textarea rows="5" cols="40"></textarea><br><br>

        <label>Submit Your File</label>
        <input type="submit" value="Submit"><br>
        <input type="button" value="Submit"><br><br>

        <label>Reset Your File</label>
        <input type="reset" value="Reset"><br><br>


    </form>
</body>
</html>
